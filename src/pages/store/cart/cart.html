<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore Carrito</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="store-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo__icon">🍕</span>
                <h1 class="logo__text">Food<span class="logo__span">Store</span></h1>
            </div>

            <nav class="nav">
                <a href="../home/home.html" class="nav__link">
                    <i class="nav-link__icon">🏠</i> Catálogo
                </a>
                <a href="../cart/cart.html" class="nav__link">
                    <i class="nav-link__icon">🛒</i> Carrito
                    <span id="cart-count" class="nav-link__span">0</span>
                </a>
                <button id="logout-btn" class="nav__btn">Salir</button>
            </nav>
        </div>
    </header>
    <main>
        <section class="cart-section">
            <h2 class="cart-section__text">Carrito de Compras</h2>
            <div id="cart-items" class="cart-container">
                <!-- Cart items will be dynamically inserted here -->
            </div>
            <div class="cart-total">
                <strong class="cart-total__text"><span id="total-amount" class="cart-total__price">0.00</span></strong>
            </div>
            <button id="clear-cart-btn" class="cart-section__btn cart-section__btn--clear">Limpiar Carrito</button>
            <button id="checkout-btn" class="cart-section__btn cart-section__btn--checkout">Finalizar Compra</button>
        </section>
    </main>
    <script type="module" src="/src/pages/store/cart/cart.js"></script>
</body>
</html>
