<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="auth-card">
        <div class="logo">
            <span class="logo__icon">🍕</span>
            <h1 class="logo__text logo__text--auth">Food<span class="logo__span">Store</span></h1>
        </div>

        <h1 class="auth-card__text">Login</h1>
    
        <form id="form" class="form">
    
            <div class="form-group">
                <label class="form-group__label" for="email">Email</label>
                <input class="form-group__input" id="email" name="email" autocomplete="off" placeholder="example@example.com">
            </div>
            <div class="form-group">
                <label class="form-group__label" for="password">Password</label>
                <input class="form-group__input" type="password" id="password" name="password" autocomplete="off" placeholder="********">
            </div>
            <div class="form-group">
                <label class="form-group__label" for="rol">Rol</label>
                <select class="form-group__select" name="rol" id="rol">
                    <option value="">Seleccione un rol</option>
                    <option value="client">Cliente</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            
            <p id="error-message" class="form__error"></p>
            <button class="form__btn login-form__btn--submit" type="submit">Ingresar</button>
            <button class="form__btn login-form__btn--secondary" type="button" id="registerBtn">Registrarse</button>
        </form>

    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
