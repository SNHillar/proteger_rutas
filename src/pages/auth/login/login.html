<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <main class="login-container">
        <h1> Login</h1>
    
        <form id="form" class="login-form">
    
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
            </div>
            <div class="input-group">
                <label for="rol">Rol</label>
                <select name="rol" id="rol">
                    <option value="">Seleccione un rol</option>
                    <option value="client">Cliente</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
    
            <button type="submit" class="btn-login">Ingresar</button>
            <button type="button" id="registerBtn" class="btn-register">Registrarse</button>
        </form>

    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
