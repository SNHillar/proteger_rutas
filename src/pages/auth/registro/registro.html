<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro FoodStore</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="register-container">
        <div class="logo-register">
            <span class="logo-icon">🍕</span>
            <h1>Food<span>Store</span></h1>
        </div>

        <h1> Registro</h1>
        <form id="form">
    
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="********">
            </div>
            <p id="error-message" class="error-message"></p>
            <button type="submit" class="btn-register">Registrar</button>
        </form>
    </main>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
